<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EssayageAI - Essayez vos vêtements</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4299e1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .upload-zone {
            transition: all 0.3s ease;
        }
        .upload-zone:hover {
            border-color: #4299e1;
            background-color: #f7fafc;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="text-2xl font-bold">
                    <span class="text-blue-600">👕 Essayage</span><span class="text-gray-800">AI</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600">Crédits: <span id="creditsDisplay">10</span></span>
                    <a href="#pricing" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">
                        Acheter +
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteneur principal -->
    <div class="max-w-6xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8">
            Essayez vos vêtements <span class="text-blue-600">instantanément</span>
        </h1>

        <!-- Zone d'upload -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <div class="grid md:grid-cols-2 gap-6">
                <!-- Photo personne -->
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center upload-zone cursor-pointer"
                     onclick="document.getElementById('personInput').click()">
                    <input type="file" id="personInput" accept="image/*" class="hidden" onchange="previewImage(this, 'personPreview')">
                    <div id="personPreview" class="min-h-[250px] flex items-center justify-center">
                        <div class="text-gray-400">
                            <svg class="w-20 h-20 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <p class="font-medium">Votre photo</p>
                            <p class="text-sm">Cliquez pour charger</p>
                        </div>
                    </div>
                </div>

                <!-- Photo vêtement -->
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center upload-zone cursor-pointer"
                     onclick="document.getElementById('garmentInput').click()">
                    <input type="file" id="garmentInput" accept="image/*" class="hidden" onchange="previewImage(this, 'garmentPreview')">
                    <div id="garmentPreview" class="min-h-[250px] flex items-center justify-center">
                        <div class="text-gray-400">
                            <svg class="w-20 h-20 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <p class="font-medium">Le vêtement</p>
                            <p class="text-sm">Cliquez pour charger</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Message d'erreur -->
            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-lg text-center"></div>

            <!-- Bouton d'essai -->
            <button id="tryButton" onclick="tryOn()" disabled
                    class="mt-6 w-full bg-blue-600 text-white py-4 px-6 rounded-xl font-bold text-lg 
                           disabled:bg-gray-400 hover:bg-blue-700 transition transform hover:scale-105">
                ✨ Essayer ce vêtement (1 crédit)
            </button>

            <!-- Loading -->
            <div id="loading" class="hidden mt-8 flex flex-col items-center">
                <div class="loading-spinner mb-4"></div>
                <p class="text-gray-600">Génération en cours... (quelques secondes)</p>
            </div>
        </div>

        <!-- Résultat -->
        <div id="resultCard" class="hidden bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-2xl font-bold mb-4 text-center">Résultat</h2>
            <img id="resultImage" src="" alt="Résultat de l'essayage" class="max-h-[500px] mx-auto rounded-lg shadow-md">
            <div class="flex justify-center mt-4 space-x-4">
                <button onclick="window.location.href='#upload'" class="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700">
                    Essayer un autre
                </button>
                <button onclick="window.location.href='#pricing'" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Acheter plus
                </button>
            </div>
        </div>
    </div>

    <script>
        let personFile = null;
        let garmentFile = null;

        // Fonction pour prévisualiser les images
        function previewImage(input, previewId) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById(previewId);
                preview.innerHTML = `<img src="${e.target.result}" class="max-h-[250px] mx-auto rounded-lg" alt="Prévisualisation">`;
                
                if (previewId === 'personPreview') {
                    personFile = file;
                } else {
                    garmentFile = file;
                }
                
                updateButtonState();
            };
            reader.readAsDataURL(file);
        }

        // Activer/désactiver le bouton
        function updateButtonState() {
            const button = document.getElementById('tryButton');
            button.disabled = !(personFile && garmentFile);
        }

        // Fonction principale d'essayage (AVEC URLs de test)
        async function tryOn() {
            if (!personFile || !garmentFile) {
                alert("Veuillez charger les deux photos");
                return;
            }

            const button = document.getElementById('tryButton');
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('errorMessage');
            const resultCard = document.getElementById('resultCard');
            
            button.disabled = true;
            loading.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            resultCard.classList.add('hidden');

            try {
                // URLs d'exemple pour tester (images libres de droit)
                // En conditions réelles, on uploaderait les photos de l'utilisateur
                const testPersonUrl = "https://images.unsplash.com/photo-1542293787938-c9e299b880cc?w=400";
                const testGarmentUrl = "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=400";

                console.log("📤 Envoi à l'API...");
                
                const response = await fetch('/api/tryon', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        personImageUrl: testPersonUrl,
                        garmentImageUrl: testGarmentUrl
                    })
                });

                console.log("📥 Réponse reçue, status:", response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ Erreur serveur:', errorText);
                    throw new Error('Erreur serveur: ' + response.status);
                }

                const data = await response.json();
                console.log("✅ Données reçues:", data);
                
                const resultImage = document.getElementById('resultImage');
                resultImage.src = data.imageUrl;
                resultCard.classList.remove('hidden');
                
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
                console.error('❌ Erreur:', error);
            } finally {
                loading.classList.add('hidden');
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
